body:
  text: 金石經眼録目録類二金石之屬提要臣等謹按金石經眼録一卷國朝禇峻摹圗牛運震補説運震有空山堂易解已著録峻字千峰郃陽人工於鐫字以販鬻碑刻為業每裹糧走深山窮谷敗墟廢址之間搜求金石之文凡前人所未及録與雖録而非所目擊未能詳悉言之者皆據所親見繪其形狀摹其字畫併其剝蝕刓缺之處一一手自鉤勒作為縮本鐫於棗板纎悉逼真自太學石鼓以下迄於曲阜顔氏所藏漢無名碑隂為數四十有七運震各係以説詳其髙卑廣狹及所在之處其假借通用之字亦略訓釋所收頗狹而較諸家皆有據書成於乾隆元年峻自為序後運震又即峻此書增以巴里坤新出裴岑紀功碑改名金石圗運震未至西域僅得糢糊拓本所摹頗失其真又仿嶽珂之例於説後各贅以贊亦為蛇足峻復自益以唐碑别為下卷體例逈然各别尤病糅雜今以此本著録而續刻之本則别存目焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書金石經眼録郃陽禇峻摹滋陽牛運震説編輯金石文字為書者自宋元以來惟歐陽文忠公始蓋趙洪楊王諸公以洎趙子崡顧寧人諸先生皆有成書然物之顯晦有時其崖崩河決疊出水土者諸公亦不能備覽而盡載也余素顓愚性偏好古然好之而無力雖馮翊華嶽韋曲昭陵諸數碑乃居家之最近且易有者尚不能致之而得也故不憚跋涉常裹糧襆被周逰四海九州名山大澤遇窮崖絶壁荒林敗塜凡有周秦漢魏六朝隋唐篆𨽻真草石刻之字書見於其問者無不手自摹拓然而殘碑斷碣經風霜兵火棄置于墟莽榛棘之中而蕪沒于矼礎墻几之用者不一而足憾余生晚攟托垂三十年共得碑碣千餘種矣其間前諸公所未見與見之未詳輯諸一册摘録古迹既詳其所在復繪其圭趺圖樣臨其字畫形似并剝蝕殘缺之處亦為臨仿俾人一見瞭然而且厯厯如覩原碑完缺之形狀故名之曰金石經眼録良常吏部虛舟吳門太史澄齋二先生咸相贈以序又勸余事貴有成勿始勤而終怠他日果成一書令後之視今金石經眼録亦猶今之視昔歐趙集古録噫豫之為此豈敢擬歐趙諸公之集録哉蓋殫平生之心力早夜臨仿或如文忠公所云物常聚於所好惟其玩而老焉可也乾隆元年歲次丙辰夏六月草三日郃陽禇峻千峯序右石鼓第一髙一尺七寸圍六尺六寸字徑一寸在太學戟門內東側西向右石鼓第二髙二尺一寸圍六尺三寸在戟門內東側西向右石鼓第三髙一尺八寸圍六尺四寸在戟門內東側北向右石鼓第四髙二尺圍七尺三寸在戟門東向北向右石鼓第五髙二尺一寸圍六尺八寸在側門內東側北向右石鼓第六髙一尺五寸圍六尺八寸在戟門內西側東向右石鼓第七髙二尺二寸圍六尺七寸在戟門內西側北向右石鼓第八髙一尺六寸圍六尺八寸在戟門內西側東向剝蝕無一字右石鼓第九髙二尺九寸圍七尺八寸在戟門內西側北向右石鼓第十髙二尺一寸圍六尺三寸在戟門內西側北向右鼎銘周時器也髙一尺三寸二分腹徑一尺五寸八分口徑一尺四寸五分耳髙三寸濶四寸二分足六寸一分深八寸二分銘文在腹內外悉為雲雷之文在丹徒縣焦山佛寺中右泰山石刻髙三尺五寸圍四尺二寸字徑一寸七分在泰山頂上碧霞元君宫之東廡右魯孝王石刻髙一尺一寸濶一尺九寸厚一尺刻字處方七寸字徑一寸五分在曲阜縣孔子廟同文門西側北向右祝其卿及上谷府卿石龕祝其卿龕髙一尺濶二尺厚一尺刻字處髙四寸濶五寸五分字徑一寸一分上谷府卿龕髙厚濶與祝其卿等惟刻字處濶六寸在曲阜縣雍正十年廟官陳百户從孔林移置孔廟西齋宿所右太室神道碑闕銘并額髙八尺濶六尺厚一尺六寸刻銘處髙八寸濶三尺三寸字徑一寸南向額北向髙七寸五分濶八寸字徑二寸六分在登封縣東八里中嶽廟前百步右少室神道石闕銘髙八尺五寸濶五尺五寸厚一尺八寸刻字處髙一尺濶三尺八寸字徑一寸四分此西闕及西側也在登封縣西十里鋪西南三里許田間南向右少室神道之闕刻于西闕之隂北向刻字處髙七寸濶七寸五分字徑二寸三分右少室東闕題名髙濶厚與西闕等刻字處髙一尺濶六尺字徑一寸二分北向雍正三年雒陽董金甌相函遊嵩山表出之前人皆未及見右開母廟石闕銘并季度銘及東側髙八尺五寸濶六尺厚一尺六寸刻字處髙二尺三寸字徑一寸八分下刻季度銘處髙七寸五分濶二尺三寸字徑一寸五分在登封縣北十里崇福觀東草步許北向右北海相景君銘并隂髙六尺濶二尺二寸厚五寸五分字徑九分額字徑一寸六分隂字徑七分在濟寧州孔子廟戟門東側西向碑以倉為蒼以渘為柔以衙為禦以醳為釋以􅚸為慟以麋為即戀字即奔字褱即懷字􅀢即棄字右置孔廟百石卒史碑髙五尺五寸濶二尺五寸厚七寸字徑一寸一分在曲阜縣孔子廟同文門西側南向碑十即七字彖即豕字即赫字右韓勑造孔廟禮器碑并隂及兩側髙四尺五寸濶二尺二寸厚五寸字長七分至一寸七分字徑二分至一寸二分其間大小不拘體勢在曲阜縣孔子廟同文門西側東向碑以伎為暨􅚮音􅀈即籩字漆即􅃮字右郎中鄭固碑髙四尺二寸濶二尺厚六寸字徑一寸一分額字徑一寸五分在濟寧州孔子廟戟門西側東向碑已亡其下半雍正六年李鯤化鵬于泮池左發地得之移置碑傍下截髙六寸濶一尺四寸碑以愕為諤以佹為詭以錮為固以幕為模即曷字右泰山都尉孔宙碑并隂髙八尺五寸濶三尺二寸厚八寸字徑一寸五分額字徑二寸五分碑隂字徑一寸二分隂額字徑二寸在曲阜縣孔子廟同文門東側南向碑以槈為耨兕即兕字簠簋即簠簋字敶即陳字右孔褒碑髙七尺三寸濶二尺八寸厚六寸五分字徑一寸一分額字徑一寸六分雍正三年曲阜縣發地得之廟官陳百户移置孔子廟同文門內西側北向右竹邑侯相張夀碑僅存上半不知何時辱為碑趺萬厯間城武縣令復起陷置孔子廟戟門東壁西向濶三尺髙二尺字徑七分趺眼所傷四十字右史晨請出家穀祀孔子廟碑髙五尺五寸濶二尺四寸厚七寸字徑八分在曲阜縣孔子廟同文門東側東向碑以倉為蒼煙為禋汁為叶挈即契字􅞗古響字右史晨饗孔廟後碑字徑一寸刻于前建寧二年祀孔子廟碑之隂碑以文陽為汶陽壖為壖􅀢即薦字即墻字壞即壞字肉即肉字右衛尉卿衡方碑髙八尺濶三尺厚七寸字徑一寸二分額字徑二寸八分在汶上縣西南十五里平原郭家樓前南向雍正八年汶水泛溢是碑衝決倒卧莊主郭承錫承銓承鈺出資復立碑以濡為儒倍為背淡為痰緄為衮庵為奄冭即太字右陳德碑并隂僅存上截髙一尺八寸濶二尺厚五寸字徑一寸五分額字徑二寸隂字徑二寸隂額字徑二寸四分在沂州東南數十里雍正六年為土人所埋藏不可復拓右博陵太守孔彪碑并隂髙八尺濶二尺六寸厚八寸字徑八分額字徑二寸隂字徑一寸在曲阜縣孔子廟同文門東側西向碑以肴為爻沂為涯􅀢即薦字即字折即拯字即繫字即漫字右司𨽻校尉魯峻碑并隂髙八尺五寸濶三尺厚七寸字徑一寸二分額字徑二寸二分隂字徑八分在濟寧州孔子廟戟門東側西向碑以刊為看縱為蹤斨為析為億緄為衮偄即儒字㛃即潔字班即琴字薝即嗟字右聞喜長韓仁銘髙六尺濶三尺厚六寸五分字徑一寸五分額字徑二寸五分至大六年出土在滎陽縣署東角門東側西向碑任即任字㐬即不字􅀢即王字勛古勳字右豫州從事尹宙碑髙六尺濶二尺八寸厚六寸字徑一寸二分額字徑二寸二分在鄢陵縣孔子廟戟門前南向碑圭即王字右魯王墓石人題刻髙五尺腰圍七尺下半埋土中不知幾許字徑四寸在曲阜縣東南五里許張屈莊西古冢東側西向右魯王墓石人題刻髙五尺五寸腰圍七尺五寸並立府門之口之左相去五六步西向兩石人像極古拙右溧陽長潘乾校官碑髙四尺濶二尺五寸厚四寸五分字徑一寸額字徑二寸五分在溧水縣孔子廟內南向碑以􅀢為黎卑為俾厲即厲字責即責字蔓即蔓字􅂒即房字右蒼頡廟碑并隂及兩側髙五尺濶二尺厚五寸在白水縣東北五十里史官村正北五里許廟內西向右白石神君碑并隂髙五尺五寸濶二尺二寸厚四寸五分字徑八分額字徑一寸八分隂字徑八分在元氏縣城內龍化寺後西向碑以畨昌為蕃昌祏即拓字右曹全碑并隂髙五尺二寸濶二尺六寸字徑九分隂字徑七分在郃陽縣孔子廟東角門內西向碑快即快字右尉氏令鄭季宣碑并隂髙四尺濶三尺厚七寸字徑一寸二分隂字徑一寸二分隂額字徑一寸五分在濟寧州孔子廟戟門東側陽面附牆碑隂西向右蕩隂令張遷碑并隂髙六尺三寸濶二尺六寸厚五寸字徑九分額字徑二寸八分隂字徑一寸一分在東平州學明倫堂前南向碑以殯為賔以中為忠暨字分為既且二字乃當時書碑者誤非重刻也右執金吾丞武榮碑髙六尺三寸濶二尺二寸厚六寸字徑九分額字徑二寸二分在濟寧州孔子廟戟門西側東向右孔謙碣髙二尺四寸濶一尺四寸厚五寸字徑一寸在曲阜縣孔子廟同文門西側北向右孔宏碣髙二尺七寸濶二尺三寸厚六寸字徑一寸一分在曲阜縣孔子廟同文門東倒北向右雒陽令王稚子闕在新都縣北十二里大路傍西墓前其闕有二雍正九年一倒沒于溝水中止存此一闕髙一丈五尺濶三尺厚二尺五寸字徑三寸五分東向右楊公之闕在梓潼縣北一里許大道傍東數十步田間西向髙一丈六尺濶四尺五寸厚三尺字徑三寸五分右尹君之闕一闕兩面一題尹君一題尹公在廣原縣東南數十里山間倒卧髙七尺五寸濶二尺厚一尺五寸字徑五寸五分右漢碑隂髙四尺濶二尺厚三寸字徑八分正面無字隱隱有竹葉文在曲阜縣顔懋倫樂清家金石經眼録
